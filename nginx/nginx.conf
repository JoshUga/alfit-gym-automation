events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 ipv6=off valid=30s;

    server {
        listen 80;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location ~ ^/auth/(.*)$ {
            set $auth_upstream http://auth-service:8000;
            proxy_pass $auth_upstream/auth/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/gyms/[^/]+/(members|groups|trainer-assignments)$ {
            set $member_upstream http://member-service:8000;
            proxy_pass $member_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/gyms/[^/]+/attendance/(.*)$ {
            set $attendance_upstream http://attendance-service:8000;
            proxy_pass $attendance_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/gyms/[^/]+/members/[^/]+/attendance/(.*)$ {
            set $attendance_upstream http://attendance-service:8000;
            proxy_pass $attendance_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/gyms/[^/]+/members/[^/]+/workout-plan$ {
            set $workout_upstream http://workout-service:8000;
            proxy_pass $workout_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/members/[^/]+/workout-plan/(.*)$ {
            set $workout_upstream http://workout-service:8000;
            proxy_pass $workout_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/workout-plans/(.*)$ {
            set $workout_upstream http://workout-service:8000;
            proxy_pass $workout_upstream/api/v1/workout-plans/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/attendance/(.*)$ {
            set $attendance_upstream http://attendance-service:8000;
            proxy_pass $attendance_upstream/api/v1/attendance/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/gyms/(.*)$ {
            set $gym_upstream http://gym-service:8000;
            proxy_pass $gym_upstream/api/v1/gyms/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/members(.*)$ {
            set $member_upstream http://member-service:8000;
            proxy_pass $member_upstream/api/v1/members$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/groups/(.*)$ {
            set $member_upstream http://member-service:8000;
            proxy_pass $member_upstream/api/v1/groups/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /templates {
            set $notification_upstream http://notification-service:8000;
            proxy_pass $notification_upstream/templates;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /notifications/ {
            set $notification_upstream http://notification-service:8000;
            proxy_pass $notification_upstream/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ai/ {
            set $ai_upstream http://ai-service:8000;
            proxy_pass $ai_upstream/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /plans {
            set $billing_upstream http://billing-service:8000;
            proxy_pass $billing_upstream/plans;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /subscriptions {
            set $billing_upstream http://billing-service:8000;
            proxy_pass $billing_upstream/subscriptions;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /analytics/ {
            set $analytics_upstream http://analytics-service:8000;
            proxy_pass $analytics_upstream/analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /logs/ {
            set $analytics_upstream http://analytics-service:8000;
            proxy_pass $analytics_upstream/logs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/ {
            set $admin_upstream http://admin-service:8000;
            proxy_pass $admin_upstream/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /upload {
            set $storage_upstream http://storage-service:8000;
            proxy_pass $storage_upstream/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 50M;
        }

        location /files/ {
            set $storage_upstream http://storage-service:8000;
            proxy_pass $storage_upstream/files/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /email/ {
            set $email_upstream http://email-service:8000;
            proxy_pass $email_upstream/email/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /messages/ {
            set $message_upstream http://message-service:8000;
            proxy_pass $message_upstream/messages/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 '{"status": "healthy", "service": "api-gateway"}';
            add_header Content-Type application/json;
        }
    }
}
