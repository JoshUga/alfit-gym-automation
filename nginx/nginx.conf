events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 ipv6=off valid=30s;

    upstream auth_service {
        server auth-service:8000;
    }
    upstream gym_service {
        server gym-service:8000;
    }
    upstream member_service {
        server member-service:8000;
    }
    upstream notification_service {
        server notification-service:8000;
    }
    upstream ai_service {
        server ai-service:8000;
    }
    upstream billing_service {
        server billing-service:8000;
    }
    upstream analytics_service {
        server analytics-service:8000;
    }
    upstream admin_service {
        server admin-service:8000;
    }
    upstream storage_service {
        server storage-service:8000;
    }
    upstream email_service {
        server email-service:8000;
    }
    upstream message_service {
        server message-service:8000;
    }
    upstream attendance_service {
        server attendance-service:8000;
    }
    upstream workout_service {
        server workout-service:8000;
    }

    server {
        listen 80;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location ~ ^/auth/(.*)$ {
            set $auth_upstream http://auth-service:8000;
            proxy_pass $auth_upstream/auth/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/gyms/[^/]+/(members|groups)$ {
            set $member_upstream http://member-service:8000;
            proxy_pass $member_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/gyms/[^/]+/attendance/(.*)$ {
            set $attendance_upstream http://attendance-service:8000;
            proxy_pass $attendance_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/gyms/[^/]+/members/[^/]+/attendance/(.*)$ {
            set $attendance_upstream http://attendance-service:8000;
            proxy_pass $attendance_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/gyms/[^/]+/members/[^/]+/workout-plan$ {
            set $workout_upstream http://workout-service:8000;
            proxy_pass $workout_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/members/[^/]+/workout-plan/(.*)$ {
            set $workout_upstream http://workout-service:8000;
            proxy_pass $workout_upstream/api/v1$uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/workout-plans/(.*)$ {
            set $workout_upstream http://workout-service:8000;
            proxy_pass $workout_upstream/api/v1/workout-plans/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/attendance/(.*)$ {
            set $attendance_upstream http://attendance-service:8000;
            proxy_pass $attendance_upstream/api/v1/attendance/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/gyms/(.*)$ {
            set $gym_upstream http://gym-service:8000;
            proxy_pass $gym_upstream/api/v1/gyms/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/members(.*)$ {
            set $member_upstream http://member-service:8000;
            proxy_pass $member_upstream/api/v1/members$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/groups/(.*)$ {
            set $member_upstream http://member-service:8000;
            proxy_pass $member_upstream/api/v1/groups/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /templates {
            proxy_pass http://notification_service/templates;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /notifications/ {
            proxy_pass http://notification_service/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ai/ {
            proxy_pass http://ai_service/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /plans {
            proxy_pass http://billing_service/plans;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /subscriptions {
            proxy_pass http://billing_service/subscriptions;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /analytics/ {
            proxy_pass http://analytics_service/analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /logs/ {
            proxy_pass http://analytics_service/logs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/ {
            proxy_pass http://admin_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /upload {
            proxy_pass http://storage_service/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 50M;
        }

        location /files/ {
            proxy_pass http://storage_service/files/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /email/ {
            proxy_pass http://email_service/email/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /messages/ {
            proxy_pass http://message_service/messages/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 '{"status": "healthy", "service": "api-gateway"}';
            add_header Content-Type application/json;
        }
    }
}
