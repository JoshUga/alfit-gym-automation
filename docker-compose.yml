services:
  # Infrastructure
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: alfit
      MYSQL_USER: alfit
      MYSQL_PASSWORD: alfit_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alfit-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alfit-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alfit-network

  # Backend Services
  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    ports:
      - "8001:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_auth
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET_KEY: your-production-secret-key
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alfit-network

  gym-service:
    build:
      context: .
      dockerfile: services/gym_service/Dockerfile
    ports:
      - "8002:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_gym
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET_KEY: your-production-secret-key
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_GLOBAL_KEY: ${EVOLUTION_API_GLOBAL_KEY:-change-me}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_MODEL: ${AI_MODEL:-phi4-mini-reasoning}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-phi4-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      EMAIL_SERVICE_URL: http://email-service:8000
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alfit-network

  evolution-api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8081}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_GLOBAL_KEY:-change-me}
      DATABASE_PROVIDER: mysql
      DATABASE_CONNECTION_URI: mysql://alfit:alfit_password@mysql:3306/alfit
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/0
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://message-service:8000/api/v1/messages/evolution-upsert
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - alfit-network

  emailengine:
    image: postalsys/emailengine:latest
    command:
      - node
      - server.js
      - --dbs.redis=redis://host.docker.internal:6379/8
      - --api.port=3000
      - --api.host=0.0.0.0
    depends_on:
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EENGINE_PORT: 3000
      EENGINE_HOST: 0.0.0.0
      EENGINE_API_PROXY: "false"
      EENGINE_REQUIRE_API_AUTH: "true"
      EENGINE_PREPARED_TOKEN: g6JpZNlANzcwY2UxYWU0YjdiZDk0M2M1YmRhOTg5YjYxNGJhNTIzNzUzNTcxMDg3YzlmMmE5OGJiMzE4YjU0OTFmMjhlNKZzY29wZXORoSqrZGVzY3JpcHRpb261YWxmaXQgYm9vdHN0cmFwIHRva2Vu
      EENGINE_SECRET: alfit-emailengine-secret
    networks:
      - alfit-network

  member-service:
    build:
      context: .
      dockerfile: services/member_service/Dockerfile
    ports:
      - "8003:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_member
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET_KEY: your-production-secret-key
      GYM_SERVICE_URL: http://gym-service:8000
      WORKOUT_SERVICE_URL: http://workout-service:8000
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alfit-network

  notification-service:
    build:
      context: .
      dockerfile: services/notification_service/Dockerfile
    ports:
      - "8004:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_notification
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET_KEY: your-production-secret-key
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - alfit-network

  ai-service:
    build:
      context: .
      dockerfile: services/ai_service/Dockerfile
    ports:
      - "8005:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_ai
      REDIS_HOST: redis
      JWT_SECRET_KEY: your-production-secret-key
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_MODEL: ${AI_MODEL:-phi4-mini-reasoning}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-phi4-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      AI_BASE_PROMPT: ${AI_BASE_PROMPT:-You are a helpful gym assistant. Keep responses concise and practical.}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - alfit-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - alfit-network

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: ${OLLAMA_BASE_URL:-http://ollama:11434}
      AI_MODEL: ${AI_MODEL:-phi4-mini-reasoning}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-phi4-mini}
    entrypoint: ["/bin/sh", "-lc"]
    command: ["sleep 5 && (ollama pull ${AI_MODEL:-phi4-mini-reasoning} || ollama pull ${AI_FALLBACK_MODEL:-phi4-mini} || ollama pull phi4-mini)"]
    networks:
      - alfit-network

  billing-service:
    build:
      context: .
      dockerfile: services/billing_service/Dockerfile
    ports:
      - "8007:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_billing
      REDIS_HOST: redis
      JWT_SECRET_KEY: your-production-secret-key
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - alfit-network

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics_service/Dockerfile
    ports:
      - "8008:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_analytics
      REDIS_HOST: redis
      JWT_SECRET_KEY: your-production-secret-key
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - alfit-network

  admin-service:
    build:
      context: .
      dockerfile: services/admin_service/Dockerfile
    ports:
      - "8009:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_admin
      REDIS_HOST: redis
      JWT_SECRET_KEY: your-production-secret-key
      SERVICE_ADMIN_USERNAME: ${SERVICE_ADMIN_USERNAME:-service-admin}
      SERVICE_ADMIN_PASSWORD: ${SERVICE_ADMIN_PASSWORD:-change-this-service-admin-password-now}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - alfit-network

  storage-service:
    build:
      context: .
      dockerfile: services/storage_service/Dockerfile
    ports:
      - "8010:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_storage
      JWT_SECRET_KEY: your-production-secret-key
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - alfit-network

  email-service:
    build:
      context: .
      dockerfile: services/email_service/Dockerfile
    ports:
      - "8011:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_email
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET_KEY: your-production-secret-key
      EMAILENGINE_BASE_URL: http://emailengine:3000
      EMAILENGINE_API_TOKEN: 111122223333444455556666777788889999aaaabbbbccccddddeeeeffff0000
      SMTP_HOST: smtp-relay.brevo.com
      SMTP_PORT: 587
      SMTP_USERNAME: a7ac85001@smtp-brevo.com
      SMTP_PASSWORD: xsmtpsib-3fa50da9495e06ce1004554d0ec78d7779bf110e9987248d52eb566950df301b-NiLLMBiqvJlUpYaE
      SMTP_FROM_EMAIL: gym@withmexo.space
      SMTP_FROM_NAME: Alfit Gym
      SMTP_SECURE: "false"
      EMAILENGINE_BOOTSTRAP_MAX_RETRIES: 20
      EMAILENGINE_BOOTSTRAP_RETRY_DELAY_SECONDS: 2
    depends_on:
      mysql:
        condition: service_healthy
      emailengine:
        condition: service_started
    networks:
      - alfit-network

  message-service:
    build:
      context: .
      dockerfile: services/message_service/Dockerfile
    ports:
      - "8012:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_message
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET_KEY: your-production-secret-key
      AI_SERVICE_URL: http://ai-service:8000
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_GLOBAL_KEY: ${EVOLUTION_API_GLOBAL_KEY:-change-me}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - alfit-network

  attendance-service:
    build:
      context: .
      dockerfile: services/attendance_service/Dockerfile
    ports:
      - "8014:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_attendance
      REDIS_HOST: redis
      JWT_SECRET_KEY: your-production-secret-key
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alfit-network

  workout-service:
    build:
      context: .
      dockerfile: services/workout_service/Dockerfile
    ports:
      - "8015:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: alfit_workout
      REDIS_HOST: redis
      JWT_SECRET_KEY: your-production-secret-key
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - alfit-network

  # API Gateway
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - gym-service
      - member-service
      - notification-service
      - ai-service
      - billing-service
      - analytics-service
      - admin-service
      - storage-service
      - email-service
      - message-service
      - attendance-service
      - workout-service
    restart: unless-stopped
    networks:
      - alfit-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3300:80"
    depends_on:
      - nginx
    networks:
      - alfit-network

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  evolution_instances:
  evolution_store:
  ollama_data:

networks:
  alfit-network:
    driver: bridge
